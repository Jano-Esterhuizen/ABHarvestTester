write_be_tests:
  description: >
    Write Playwright API tests (.spec.ts) for these endpoints.

    APP URL: {app_url}
    ROLES: {roles}
    CREDENTIALS: {credentials}
    LOGIN CONTRACT:
    - login_url_path: {login_url_path}
    - username_field: {login_username_field}
    - password_field: {login_password_field}

    ENDPOINTS TO TEST:
    {api_chunk}

    TEST PLAN (relevant section):
    {plan_chunk}
    {feedback}

    Rules:
    - Use Playwright request fixture, no external HTTP libs, and never import request from @playwright/test
    - Build login payload keys EXACTLY from LOGIN CONTRACT (for example use email when username_field=email)
    - beforeAll: login to get token, set baseURL from process.env.BASE_URL
    - AAA pattern: Arrange (create data via API), Act, Assert
    - Test each role that should/shouldn't have access
    - expect() for status codes, expect.soft() for body shape
    - For invalid-login scenarios, assert unauthorized via `expect([400, 401]).toContain(response.status())`
      and assert an error/message field exists in response body
    - Always `await response.json()` before reading body properties
    - Use credentials supplied in CREDENTIALS context for login tests, do not invent users
    - Output ONE complete .spec.ts file
    - HARD LIMIT: maximum 2 test cases per endpoint — pick the 2 highest priority (P0 first, then P1)

    Output ONLY the TypeScript code, no explanation.
  expected_output: >
    A complete valid TypeScript Playwright API test file.
  agent: be_test_writer
