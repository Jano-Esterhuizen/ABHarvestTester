write_be_tests:
  description: >
    Write Playwright API tests (.spec.ts) for these endpoints.

    APP URL: {app_url}
    ROLES: {roles}
    CREDENTIALS: {credentials}

    ENDPOINTS TO TEST:
    {api_chunk}

    TEST PLAN (relevant section):
    {plan_chunk}
    {feedback}

    Rules:
    - Use Playwright request fixture, no external HTTP libs
    - beforeAll: login to get token, set baseURL from process.env.BASE_URL
    - AAA pattern: Arrange (create data via API), Act, Assert
    - Test each role that should/shouldn't have access
    - expect() for status codes, expect.soft() for body shape
    - Never hardcode credentials, use process.env
    - Output ONE complete .spec.ts file
    - HARD LIMIT: maximum 2 test cases per endpoint — pick the 2 highest priority (P0 first, then P1)

    Output ONLY the TypeScript code, no explanation.
  expected_output: >
    A complete valid TypeScript Playwright API test file.
  agent: be_test_writer
