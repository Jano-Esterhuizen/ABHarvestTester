write_fe_tests:
  description: >
    Write Playwright UI tests (.spec.ts) for these pages.

    APP URL: {app_url}
    ROLES: {roles}
    CREDENTIALS: {credentials}

    PAGES TO TEST:
    {ui_chunk}

    TEST PLAN (relevant section):
    {plan_chunk}
    {feedback}

    Rules:
    - Use Page Object Model: one POM class per page, tests import POM
    - Locators: prefer data-testid, then role, then text content
    - Wait for network idle or specific element before asserting
    - Test with each specified role (login in beforeAll)
    - Verify page content, navigation, form validation, error states
    - Output TWO files: the POM class and the test spec

    Output ONLY TypeScript code (POM then spec), separated by // --- FILE BREAK ---
  expected_output: >
    TypeScript POM class and test spec file.
  agent: fe_test_writer
