plan_tests:
  description: >
    Create a prioritised test plan for this application.

    CONTEXT:
    {context_summary}

    API ENDPOINTS:
    {api_summary}

    ROLES: {roles}

    OUTPUT a structured test plan with sections:
    1. API Tests (method, endpoint, role, priority P0-P2, assertions)
    2. UI Tests (page, role, actions, assertions)
    3. E2E Journeys (steps across pages)
    4. Negative/Security tests (permission boundaries, invalid inputs)

    Rules: Every test has ID, priority, specific assertions. Think adversarially.
    P0=auth/security, P1=core CRUD, P2=edge cases.
  expected_output: >
    A structured test plan grouped by API/UI/E2E with numbered IDs and specific assertions.
  agent: qa_analyst
