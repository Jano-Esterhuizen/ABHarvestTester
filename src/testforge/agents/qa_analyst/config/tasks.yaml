plan_tests:
  description: >
    Create a comprehensive, prioritised test plan for the target application.
    Output MUST be written in Gherkin syntax so it is human-readable by QA engineers,
    developers, and non-technical stakeholders alike.

    Application Context:
    {context_document}

    API Specification:
    {api_spec}

    Available Roles: {roles}
    Credentials: {credentials_summary}

    ANALYSIS STEPS:
    1. Inventory the surface area: count endpoints, pages, roles, data models
    2. Risk assessment: auth=P0, CRUD=P1, read-only=P2, cosmetic=P3
    3. Coverage matrix: endpoints × roles × input states (valid, invalid, missing, edge)
    4. Budget allocation: ~40% API / ~35% UI / ~25% E2E
    5. Deduplication: don't test the same thing at multiple layers

    OUTPUT FORMAT — You MUST follow this structure exactly.
    The file will be consumed by the BE Test Writer (Section 2), FE Test Writer (Section 3),
    and E2E Test Writer (Section 4). Do NOT deviate from the section headings or tag format.

    ---
    total_test_cases: <integer>
    coverage_summary:
      api_tests: <integer>
      ui_tests: <integer>
      e2e_tests: <integer>
    ---

    # Test Plan

    ## 1. Test Strategy Overview

    ### Scope
    [What is in scope and what is explicitly out of scope for this run]

    ### Coverage Goals
    [Which layers, which roles, which risk areas are prioritised and why]

    ### Priority Framework
    - P0: Auth boundaries, data corruption, security-sensitive — MUST test, blocks release
    - P1: Core CRUD, business logic validation — MUST test
    - P2: Pagination, filtering, edge cases — SHOULD test
    - P3: Non-critical validations, cosmetic — NICE to have

    ---

    ## 2. API Test Cases (for BE Test Writer)

    > Scenarios tagged @api. BE Test Writer implements ONLY these.

    ### Feature: [Resource or Capability Name]

    ```gherkin
    Feature: [Resource or Capability Name]

      @P0 @api @[role]
      Scenario: [role] can [action] with valid data
        Given a [role] user is authenticated with a valid token
        When they send [METHOD] to [/endpoint] with valid payload
        Then the response status should be [expected_status]
        And the response body should contain [key field and expected value]
        And [any additional assertion]

      @P0 @api @[role]
      Scenario: [role] is denied [action] without permission
        Given a [role] user is authenticated
        When they send [METHOD] to [/endpoint] they are not authorised for
        Then the response status should be 403
        And the response body should contain an error message

      @P1 @api @[role]
      Scenario: [action] fails with invalid payload
        Given a [role] user is authenticated
        When they send [METHOD] to [/endpoint] with [specific invalid input]
        Then the response status should be 400
        And the response body should contain a validation error for the [field] field

      @P1 @api @[role]
      Scenario: [action] with empty required field is rejected
        Given a [role] user is authenticated
        When they send [METHOD] to [/endpoint] with the [field] field set to empty string
        Then the response status should be 400
        And the response body should indicate [field] is required
    ```

    [Repeat a Feature block per resource group — Auth, Users, Projects, etc.]

    ---

    ## 3. UI Test Cases (for FE Test Writer)

    > Scenarios tagged @ui. FE Test Writer implements ONLY these.

    ### Feature: [Page or Component Name]

    ```gherkin
    Feature: [Page or Component Name]

      @P0 @ui @[role]
      Scenario: [role] can [action] on [page]
        Given I am logged in as a [role] user
        And I am on the [/page-path] page
        When I [interact with element — click, fill, select]
        Then I should see [visible outcome]
        And the page should [navigation or state change]

      @P1 @ui @[role]
      Scenario: [role] cannot see [element] they are not authorised for
        Given I am logged in as a [role] user
        And I am on the [/page-path] page
        Then the [element name] should not be visible

      @P1 @ui @[role]
      Scenario: Form validation shows error for [invalid input]
        Given I am logged in as a [role] user
        And I am on the [/page-path] page
        When I leave the [field name] field empty
        And I click [submit button]
        Then I should see a validation error for [field name]
        And the form should not submit
    ```

    [Repeat a Feature block per page or major UI component]

    ---

    ## 4. E2E Journey Test Cases (for E2E Test Writer)

    > Scenarios tagged @e2e. E2E Test Writer implements ONLY these.

    ### Feature: [User Journey or Workflow Name]

    ```gherkin
    Feature: [User Journey or Workflow Name]

      @P0 @e2e @[role]
      Scenario: [role] can complete the full [journey] workflow
        Given I am logged in as a [role] user
        And [any precondition — data that exists, state of system]
        When I navigate to [starting page]
        And I [step 1 — action]
        And I [step 2 — action]
        And I [step N — action]
        Then [final expected outcome]
        And [any secondary assertion on final state]

      @P1 @e2e @[role1] @[role2]
      Scenario: [role1] creates a resource that [role2] can view
        Given I am logged in as a [role1] user
        When I [action that creates resource]
        Then the resource should be created successfully
        Given I log out and log in as a [role2] user
        When I navigate to [page where resource appears]
        Then I should see the resource created by [role1]
    ```

    [Repeat a Feature block per cross-page user journey]

    ---

    ## 5. Negative and Security Test Cases

    ### 5.1 Permission Boundaries

    ```gherkin
    Feature: Permission Boundaries

      @P0 @api @[lower_role]
      Scenario: [lower_role] cannot access [higher_role]-only endpoint
        Given a [lower_role] user is authenticated
        When they send GET to [/admin-only-endpoint]
        Then the response status should be 403

      @P0 @ui @[lower_role]
      Scenario: [lower_role] cannot see [higher_role]-only UI element
        Given I am logged in as a [lower_role] user
        When I navigate to [/page]
        Then the [restricted element] should not be visible

      @P0 @api @[role]
      Scenario: Unauthenticated request is rejected
        Given no authentication token is provided
        When they send GET to [/protected-endpoint]
        Then the response status should be 401
    ```

    ### 5.2 Input Validation and Security

    ```gherkin
    Feature: Input Validation

      @P1 @api @[role]
      Scenario: SQL injection attempt in [field] is safely handled
        Given a [role] user is authenticated
        When they send POST to [/endpoint] with [field] set to "' OR 1=1; --"
        Then the response status should be 400
        And no data should be returned or corrupted

      @P1 @api @[role]
      Scenario: XSS payload in [field] is rejected or sanitised
        Given a [role] user is authenticated
        When they send POST to [/endpoint] with [field] set to "<script>alert(1)</script>"
        Then the response should not echo the raw script tag back

      @P1 @api @[role]
      Scenario: Oversized payload is rejected
        Given a [role] user is authenticated
        When they send POST to [/endpoint] with [field] exceeding maximum allowed length
        Then the response status should be 400 or 413
    ```

    ---

    ## 6. Test Data Requirements

    ### 6.1 Pre-existing Data Assumptions
    [List any data that must exist in the target environment before tests run]

    ### 6.2 Data Created During Tests
    [List resources that tests will create — each test cleans up its own data in afterAll]

    ### 6.3 Isolation Strategy
    [How tests avoid interfering with each other — unique timestamps, unique emails, etc.]

    ---

    GHERKIN RULES (you MUST follow these):
    - Every Scenario has: a @priority tag, a @layer tag (@api/@ui/@e2e), and a @role tag
    - Given = precondition/setup (who is logged in, what data exists, what page we are on)
    - When = the action being tested (the single event that triggers the behaviour)
    - Then = the expected observable outcome (status code, visible text, navigation)
    - And = continuation of Given/When/Then (use sparingly — one Then should be sufficient)
    - Scenario titles must complete the sentence: "[role] can/cannot [verb] [object]"
    - Never write "Then the test should pass" — name the specific observable behaviour
    - Every role must appear in at least one positive AND one negative Scenario
    - No Scenario depends on another having run first — every Scenario is self-contained
    - Think adversarially: What would a pentester try? What would a confused user do?
    - Edge cases must be specific: "empty string in name field" not "edge cases"

  expected_output: >
    A structured Gherkin test plan written in valid Feature/Scenario/Given/When/Then syntax,
    organised into sections 1-6, tagged by priority (@P0-@P3), layer (@api/@ui/@e2e),
    and role. Human-readable by QA engineers and stakeholders. Directly implementable
    by the BE, FE, and E2E test writers without ambiguity.
  agent: qa_analyst
