write_e2e_tests:
  description: >
    Write Playwright E2E journey tests for these workflows.

    APP URL: {app_url}
    ROLES: {roles}
    CREDENTIALS: {credentials}
    LOGIN CONTRACT:
    - login_url_path: {login_url_path}
    - username_field: {login_username_field}
    - password_field: {login_password_field}
    - submit_button: {login_submit_button}

    JOURNEYS TO TEST:
    {e2e_chunk}

    TEST PLAN (relevant section):
    {plan_chunk}
    {feedback}

    Rules:
    - Each test simulates a full user journey (login -> actions -> verify)
    - If using browser_snapshot, ALWAYS pass string values (never null):
      target: "body", filename: "snapshot.md"
    - Use LOGIN CONTRACT fields for authentication steps and payload keys
    - Use both page interactions and API calls where appropriate
    - Assert intermediate states (navigation, loading) and final state
    - For invalid-login assertions, prefer unauthorized checks that accept either 400 or 401
    - Clean up test data in afterAll
    - Output ONE complete .spec.ts file

    Output ONLY TypeScript code, no explanation.
  expected_output: >
    A complete valid TypeScript Playwright E2E test file.
  agent: e2e_test_writer
