review_tests:
  description: >
    Review these test results and provide fix suggestions.

    TEST RESULTS:
    {test_results}

    FAILURES TO ANALYZE:
    {failures}

    For each failure, provide:
    1. Root cause (wrong selector, auth issue, timing, bad assertion)
    2. Specific fix (exact code change needed)

    Be concise. Output structured list of fixes.
  expected_output: >
    List of failures with root cause and specific fix for each.
  agent: reviewer
